<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      
      .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr)
        gap: 15px;
      }
      
      figure {
        margin: 0;
        border: 1px solid #ddd;
        border-radius: 8px;
        overflow: hidden;
        text-align: center;
      }

      figcaption {
        padding: 10px;
        background-color: #f4f4f4:
      }
    </style>
  </head>
  <body>
    
    <h1>Photo Gallery</h1>
    
    <div class="gallery">
      <figure>
        <img src="https://piscum.photos/300/200?random=1" alt="Placeholder image 1">
        <figcaption>Image 1</figcaption>
      </figure>
      
      <figure>
        <img src="https://piscum.photos/300/200?random=2" alt="Placeholder image 2">
        <figcaption>Image 2</figcaption>
      </figure>

      <figure>
        <img src="https://piscum.photos/300/200?random=3" alt="Placeholder image 3">
        <figcaption>image 3</figcaption>
      </figure>

      <figure>
        <img src="https://piscum.photos/300/200?random=4" alt="Placeholder image 4">
        <figcaption>Image 4</figcaption>
      </figure>

      <figure>
        <img src="https://piscum.photos/300/200?=random5" alt="Placeholder image 5">
        <figcaption>Image 5</figcaption>
      </figure>

      <figure>
        <img src="https://piscum.photos/300/200?random6" alt="Placeholder image 6">
        <figcaption>Image 6</figcaption>
      </figure>
    </div>
  </body>
</html>
